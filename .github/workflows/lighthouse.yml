# Auditoria Lighthouse (Performance, A11y, Boas práticas, SEO) em HTML estático
name: Lighthouse CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
